name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Esto habilita el caché de dependencias automáticamente

    - name: Dar permisos de ejecución a Maven Wrapper
      run: chmod +x mvnw

    - name: Compilar y Ejecutar Pruebas (Unitarias e Integración)
      run: ./mvnw clean test
