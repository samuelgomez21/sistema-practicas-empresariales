spring:
  application:
    name: practicas-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/practicas_uah}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: notificacionespracticas71@gmail.com
    password: kgxldwdiiouyquga
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 50MB

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:practicas-uah-secret-key-2024-very-long-secure}
    expiration-ms: 86400000       # 24 horas

  firebase:
    config-path: ${FIREBASE_CONFIG:classpath:firebase-service-account.json}

  mail:
    from: notificacionespracticas71@gmail.com
    from-name: "Sistema de Practicas"

  cors:
    allowed-origins: ${CORS_ORIGINS:https://sistema-practicas-empresariales.vercel.app}

  frontend:
    url: ${APP_FRONTEND_URL:https://sistema-practicas-empresariales.vercel.app}

server:
  port: 8080
  error:
    include-message: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui